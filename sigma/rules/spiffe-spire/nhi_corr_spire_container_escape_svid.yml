name: nhi_corr_spire_container_escape_svid
type: correlation
status: test
description: |
    Detects container escape techniques followed by SPIRE Workload API socket
    access within 5 minutes. This is the canonical "Spooffe" attack pattern
    from Eviatar Gerzi's research: escape container, reach SPIRE Agent socket
    on the host, harvest SVIDs for lateral movement. The combination of
    privilege escalation and credential theft at this level indicates an
    active, sophisticated attack.
    Derived from Wazuh rule 101080 (timeframe=300s).
references:
    - https://attack.mitre.org/techniques/T1611/
    - https://attack.mitre.org/techniques/T1552/007/
